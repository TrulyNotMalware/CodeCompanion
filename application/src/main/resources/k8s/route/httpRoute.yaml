apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-companion-http-route
  namespace: your-namespace
spec:
  parentRefs:
    - name: api-gateway-name
      namespace: gateway-vendor-namespace
      sectionName: gateway-section-name
  hostnames:
    - your.uri
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: code-companion-svc
          port: 80
