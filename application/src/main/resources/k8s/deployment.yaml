apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-companion-deploy
spec:
  replicas: 2 # Change replicas
  selector:
    matchLabels:
      app: code-companion-deploy
  template:
    metadata:
      labels:
        app: code-companion-deploy
    spec:
      imagePullSecrets:
        - name: dockercred
      containers:
        - name: code-companion-deploy
          image: $IMAGE_NAME
          ports:
            - containerPort: 80
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: tz-seoul
              mountPath: /etc/localtime
          envFrom:
            - secretRef:
                name: code-companion-secret
            - configMapRef:
                name: code-companion-configmap
      volumes:
        - name: tz-seoul
          hostPath:
            path: /usr/share/zoneinfo/Asia/Seoul
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: code-companion-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: code-companion-deploy
