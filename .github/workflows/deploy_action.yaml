name: Deploy Production Server
on:
  pull_request:
    types:
      - closed
    branches:
      - "main"
    paths:
      - "application/**"
      - "domain/**"
      - "infrastructure/**"
      - "*.gradle.kts"
      - "gradle/**"

permissions:
  contents: read
  deployments: write
  statuses: write

env:
  K8S_APP_INGRESS_HOST: https://api.notypie.dev
  HEALTH_CHECK_ENDPOINT: /api/slack/actuator/health

  K8S_NAMESPACE: api-service
  K8S_DEPLOYMENT_NAME: code-companion-deploy
  K8S_DEPLOY_APP_CONTAINER_NAME: code-companion-deploy
  K8S_SERVICE_NAME: code-companion-svc
  DEPLOYMENT_ROLLOUT_TIMEOUT: 300s

  JAR_FILE_NAME: code-companion-prod
  STATIC_DOCKER_TAG: ${{ github.sha }}
  REGISTRY: harbor.registry.notypie.dev
  IMAGE_NAME: bot/code-companion

jobs:
  check-changes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.changes.outputs.should-deploy }}
      modules-changed: ${{ steps.changes.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app:
              - 'application/**'
            domain:
              - 'domain/**'
            infra:
              - 'infrastructure/**'
            gradle:
              - '*.gradle.kts'
              - 'gradle/**'

      - name: Determine deployment
        id: changes
        run: |
          if [[ "${{ steps.changes.outputs.app }}" == "true" || "${{ steps.changes.outputs.domain }}" == "true" || "${{ steps.changes.outputs.infra }}" == "true" || "${{ steps.changes.outputs.gradle }}" == "true" ]]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "modules=app:${{ steps.changes.outputs.app }},domain:${{ steps.changes.outputs.domain }},infra:${{ steps.changes.outputs.infra }}" >> $GITHUB_OUTPUT
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Create deployment
        uses: actions/github-script@v8
        id: deployment
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Production deployment',
              auto_merge: false,
              required_contexts: []
            });
            return deployment.data.id;

      - name: Set deployment status to in progress
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'in_progress',
              description: 'Building application...'
            });

      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build application
        run: ./gradlew :application:build -x test -PjarName=${{ env.JAR_FILE_NAME }} --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"

      # Support ARM. in my case, I'm using Oracle Cloud Infrastructure with Arm64 instances
      ######################################################
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      ######################################################
      - name: Login to Harbor registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=${{ env.STATIC_DOCKER_TAG }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./application
          platforms: linux/amd64,linux/arm64 # Support ARM
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE_NAME=${{ env.JAR_FILE_NAME }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ env.STATIC_DOCKER_TAG }}
            GIT_REF=${{ github.ref_name }}
            BUILD_NUMBER=${{ github.run_number }}
          provenance: false
          sbom: false

      - name: Update deployment status on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Build failed'
            });
    outputs:
      deployment-id: ${{ steps.deployment.outputs.result }}
      image_tag: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: [ check-changes, build ]
    if: needs.check-changes.outputs.should-deploy == 'true' && success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Deploy to Production OKE
    env:
      DEPLOYMENT_ID: ${{ needs.build.outputs.deployment-id }}

      OCI_CLI_USER: ${{ secrets.PROD_OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.PROD_OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.PROD_OCI_CLI_FINGERPRINT }}

      OCI_CLI_KEY_CONTENT: ${{ secrets.PROD_OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.PROD_OCI_CLI_REGION }}

    steps:
      - uses: actions/checkout@v4
      - name: Configure Kubectl
        uses: oracle-actions/configure-kubectl-oke@v1.5.0
        id: configure-kubectl-oke-action
        with:
          cluster: ${{ secrets.PROD_OKE_CLUSTER_OCID }}

      - name: Backup current deployment
        id: backup
        run: |
          PREVIOUS_IMAGE=$(kubectl get deployment ${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
          echo "previous-image=$PREVIOUS_IMAGE" >> $GITHUB_OUTPUT
          echo "Previous image: $PREVIOUS_IMAGE"

      - name: Apply kubernetes manifests
        run: |
          export IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.STATIC_DOCKER_TAG }}"
          envsubst < application/src/main/resources/k8s/deployment.yaml | kubectl apply -f -

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment ${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} --timeout=${{ env.DEPLOYMENT_ROLLOUT_TIMEOUT }}

      - name: Verify deployment health
        run: |
          READY_PODS=$(kubectl get pods -l app=${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.items[?(@.status.phase=="Running")].metadata.name}' | wc -w)
          DESIRED_REPLICAS=$(kubectl get deployment ${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.replicas}')
          echo "Ready pods: $READY_PODS, Desired: $DESIRED_REPLICAS"
          
          if [ "$READY_PODS" -ne "$DESIRED_REPLICAS" ]; then
            echo "Deployment verification failed."
            exit 1
          fi

          echo "Deployment success!"

      - name: Run Health check
        run: |
          echo "Testing health endpoint"
          success=false
          for i in {1..10}; do
            if curl -f -s "${{ env.K8S_APP_INGRESS_HOST }}/${{ env.HEALTH_CHECK_ENDPOINT }}" > /dev/null; then
              echo "Health check successful"
              success=true
              break
            fi
          echo "Attempt $i failed, HTTP code: $(curl -o /dev/null -s -w "%{http_code}" ...)"
          sleep 5
          done
          
          if [ "$success" = false ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Update deployment status to success
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ env.DEPLOYMENT_ID }},
              state: 'success',
              environment_url: 'https://your-app.notypie.dev',
              description: 'Deployment completed successfully'
            });

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous version..."
          PREVIOUS_IMAGE="${{ steps.backup.outputs.previous-image }}"
          
          if [ "$PREVIOUS_IMAGE" != "none" ] && [ ! -z "$PREVIOUS_IMAGE" ]; then
            kubectl set image deployment/${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} ${{ env.K8S_DEPLOY_APP_CONTAINER_NAME }}="$PREVIOUS_IMAGE"
            kubectl rollout status deployment ${{ env.K8S_DEPLOYMENT_NAME }} -n ${{ env.K8S_NAMESPACE }} --timeout=${{ env.DEPLOYMENT_ROLLOUT_TIMEOUT }}
            echo "Rollback completed to: $PREVIOUS_IMAGE"
          else
            echo "No previous image found for rollback"
          fi

      - name: Update deployment status on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ env.DEPLOYMENT_ID }},
              state: 'failure',
              description: 'Deployment failed - rolled back'
            });
